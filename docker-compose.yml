# Docker Compose Configuration for WordPress Stack
# Complete WordPress environment: MySQL · WordPress · Redis · Adminer
# Credentials are loaded from .env — copy .env.example → .env before starting.

services:

  # ── Redis (object cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wp_blog_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - wp_blog_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 160m

  # ── WordPress ──────────────────────────────────────────────────────────────
  wordpress:
    image: ${WORDPRESS_IMAGE:-wordpress:latest}
    container_name: wp_blog_site
    restart: unless-stopped
    # Direct port mapping removed — Traefik handles ingress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST:     ${WORDPRESS_DB_HOST:-host.docker.internal:3306}
      WORDPRESS_DB_USER:     ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME:     ${WORDPRESS_DB_NAME}
      # Optional WordPress salts/keys
      WORDPRESS_AUTH_KEY:            ${WORDPRESS_AUTH_KEY:-}
      WORDPRESS_SECURE_AUTH_KEY:     ${WORDPRESS_SECURE_AUTH_KEY:-}
      WORDPRESS_LOGGED_IN_KEY:       ${WORDPRESS_LOGGED_IN_KEY:-}
      WORDPRESS_NONCE_KEY:           ${WORDPRESS_NONCE_KEY:-}
      WORDPRESS_AUTH_SALT:           ${WORDPRESS_AUTH_SALT:-}
      WORDPRESS_SECURE_AUTH_SALT:    ${WORDPRESS_SECURE_AUTH_SALT:-}
      WORDPRESS_LOGGED_IN_SALT:      ${WORDPRESS_LOGGED_IN_SALT:-}
      WORDPRESS_NONCE_SALT:          ${WORDPRESS_NONCE_SALT:-}
      # Enable Redis object cache via wp-config constants
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_CACHE', true);
    volumes:
      - wp_blog_data:/var/www/html      # Themes, plugins, uploads
      - ./php/conf.d/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wp_blog_network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # HTTPS router
      - "traefik.http.routers.wp-blog.rule=Host(`${DOMAIN_NAME:-codewithabdessamad.com}`)"
      - "traefik.http.routers.wp-blog.entrypoints=websecure"
      - "traefik.http.routers.wp-blog.tls.certresolver=${LETSENCRYPT_RESOLVER:-myresolver}"
      # Internal container port
      - "traefik.http.services.wp-blog.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fso /dev/null http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m

  # ── WP-CLI (optional) ──────────────────────────────────────────────────────
  cli:
    image: ${WORDPRESS_CLI_IMAGE:-wordpress:cli}
    container_name: wp_blog_cli
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - wp_blog_data:/var/www/html
    networks:
      - wp_blog_network
    entrypoint: ["bash"]

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  wp_blog_data:       # WordPress files (themes, plugins, uploads)

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  wp_blog_network:
    driver: bridge
  web:
    external: true    # Traefik's network

# Optional Docker secrets (example)
# To enable Docker secrets, create files under `./secrets/` and
# uncomment and point the entries below. Leave as an empty mapping
# when not using secrets so Docker Compose validation succeeds.
secrets: {}
